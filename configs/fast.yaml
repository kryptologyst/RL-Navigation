# Fast training configuration for quick testing

# Environment
env:
  name: "NavigationEnv"
  grid_size: 15
  max_steps: 100
  obstacle_density: 0.1
  seed: 42

# Algorithm
algorithm:
  name: "DQN"
  learning_rate: 0.001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 200
  buffer_size: 10000
  batch_size: 32
  target_update_freq: 50
  hidden_sizes: [32, 32]

# Training
training:
  num_episodes: 200
  eval_freq: 50
  save_freq: 100
  seed: 42

# Evaluation
evaluation:
  num_episodes: 20
  max_steps: 100
  seed: 42

# Paths
paths:
  save_dir: "checkpoints"
  log_dir: "logs"
  output_dir: "outputs"

# Device
device: null  # Auto-detect: cuda -> mps -> cpu
