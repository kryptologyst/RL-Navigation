# Default configuration for RL Navigation training

# Environment
env:
  name: "NavigationEnv"
  grid_size: 20
  max_steps: 200
  obstacle_density: 0.1
  seed: 42

# Algorithm
algorithm:
  name: "DQN"
  learning_rate: 0.001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 500
  buffer_size: 100000
  batch_size: 64
  target_update_freq: 100
  hidden_sizes: [64, 64]

# Training
training:
  num_episodes: 1000
  eval_freq: 100
  save_freq: 500
  seed: 42

# Evaluation
evaluation:
  num_episodes: 100
  max_steps: 200
  seed: 42

# Paths
paths:
  save_dir: "checkpoints"
  log_dir: "logs"
  output_dir: "outputs"

# Device
device: null  # Auto-detect: cuda -> mps -> cpu
